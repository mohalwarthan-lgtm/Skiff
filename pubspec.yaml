name: skiffbox
description: A Stremio-compatible media hub with real library management, Trakt sync, and offline downloads.
publish_to: 'none'
version: 1.5.20

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  url_launcher: ^6.2.5
  window_manager: ^0.4.0
  file_selector: ^1.0.3
  material_symbols_icons: ^4.2719.3
  # media_kit bundles its own libmpv automatically - no manual setup, ever.
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
