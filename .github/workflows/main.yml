# Cloud build: every push compiles SkiffBox on GitHub's machines.
# Download finished apps from the workflow run's Artifacts section.
name: Build Skiff
on:
  push:
  workflow_dispatch:
jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Ensure Windows platform files
        run: flutter create --platforms=windows --project-name skiffbox .
      - name: App icon
        shell: pwsh
        run: Copy-Item assets/app_icon.ico windows/runner/resources/app_icon.ico -Force
      - name: Dependencies
        run: flutter pub get
      - name: Build (release)
        run: >
          flutter build windows --release
          --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }}
          --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}
      - name: Upgrade shared mpv engine (full codec set incl. TrueHD)
        shell: pwsh
        run: |
          # There must be exactly ONE libmpv in the app: media_kit's native
          # plugins link the DLL next to the exe by name. So we upgrade
          # THAT file in place (the documented way to upgrade libmpv-based
          # players), instead of loading a second engine beside it.
          $api = Invoke-RestMethod "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest"
          $asset = $api.assets |
            Where-Object { $_.name -match '^mpv-dev-x86_64-\d{8}' -and $_.name -notmatch 'v3|debug' } |
            Select-Object -First 1
          if (-not $asset) { $api.assets | ForEach-Object { Write-Host $_.name }; Write-Error 'No mpv-dev asset found'; exit 1 }
          Write-Host "Using $($asset.name)"
          Invoke-WebRequest $asset.browser_download_url -OutFile mpv-dev.7z
          7z x mpv-dev.7z -ompv-dev | Out-Null
          $dll = Get-ChildItem -Recurse mpv-dev -Filter libmpv-2.dll | Select-Object -First 1
          if (-not $dll) { Get-ChildItem -Recurse mpv-dev | ForEach-Object { Write-Host $_.Name }; Write-Error 'libmpv-2.dll not in archive'; exit 1 }
          $out = 'build/windows/x64/runner/Release'
          if (-not (Test-Path "$out/libmpv-2.dll")) { Write-Error "Bundled libmpv-2.dll not found in $out"; exit 1 }
          Copy-Item "$out/libmpv-2.dll" "$out/libmpv-2.dll.original"
          Copy-Item $dll.FullName "$out/libmpv-2.dll" -Force
          Set-Content "$out/RESTORE-SAFE-ENGINE.bat" 'copy /y "%~dp0libmpv-2.dll.original" "%~dp0libmpv-2.dll"'
          Write-Host 'Engine swapped; original kept as libmpv-2.dll.original'
      - name: Package
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath skiffbox-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: skiffbox-windows
          path: skiffbox-windows.zip
          retention-days: 3

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Ensure Android platform files
        run: flutter create --platforms=android --project-name skiffbox .
      - name: Internet permission (release manifest)
        run: |
          # Flutter's release template omits it; without this the app
          # builds fine but every network call fails on-device.
          sed -i 's#<application#<uses-permission android:name="android.permission.INTERNET"/>\n    <application#' android/app/src/main/AndroidManifest.xml
          grep -q INTERNET android/app/src/main/AndroidManifest.xml
      - name: App icon
        run: |
          # ImageMagick is no longer preinstalled, and v7 renamed the
          # binary - find whichever exists, install only if neither does.
          if ! command -v magick >/dev/null 2>&1 \
             && ! command -v convert >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq imagemagick
          fi
          IM=$(command -v magick || command -v convert)
          echo "using $IM"
          for e in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
            d=${e%%:*}; px=${e##*:}
            mkdir -p android/app/src/main/res/mipmap-$d
            "$IM" assets/logo.png -resize ${px}x${px} \
              android/app/src/main/res/mipmap-$d/ic_launcher.png
          done
          ls -l android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
      - name: Android TV support (leanback manifest)
        run: |
          M=android/app/src/main/AndroidManifest.xml
          # A TV has no touchscreen: without this the app is filtered out.
          sed -i 's#<application#<uses-feature android:name="android.software.leanback" android:required="false"/>\n    <uses-feature android:name="android.hardware.touchscreen" android:required="false"/>\n    <application#' $M
          # Show up in the TV launcher, with a banner it can draw.
          sed -i 's#<application #<application android:banner="@mipmap/ic_launcher" #' $M
          sed -i 's#<category android:name="android.intent.category.LAUNCHER"/>#<category android:name="android.intent.category.LAUNCHER"/>\n                <category android:name="android.intent.category.LEANBACK_LAUNCHER"/>#' $M
          grep -q leanback $M && grep -q LEANBACK_LAUNCHER $M
      - name: Dependencies
        run: flutter pub get
      - name: Build APK (release)
        run: >
          flutter build apk --release
          --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }}
          --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}
      - uses: actions/upload-artifact@v4
        with:
          name: skiffbox-android
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 3

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter config --enable-macos-desktop
      - run: flutter create --platforms=macos .
      - name: Allow network in the sandbox (both build modes)
        run: |
          for f in macos/Runner/DebugProfile.entitlements macos/Runner/Release.entitlements; do
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.client bool true" "$f" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :com.apple.security.network.client true" "$f"
          done
      - name: App icon
        run: |
          # sips is built into macOS; the .appiconset expects these names.
          SET=macos/Runner/Assets.xcassets/AppIcon.appiconset
          for px in 16 32 64 128 256 512 1024; do
            sips -z $px $px assets/logo.png --out $SET/app_icon_$px.png
          done
          ls $SET
      - run: flutter pub get
      - run: flutter build macos --release --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }} --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}
      - name: Zip the app bundle
        run: ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/skiffbox.app skiffbox-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: skiffbox-macos
          path: skiffbox-macos.zip
          retention-days: 3
